name: Backend CI/CD Deploy

# dev, stg, main 브랜치에 push될 때마다 실행
on:
  push:
    branches:
      - dev
      - stg
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Deploy with Docker Compose
        run: |
          # 1. 환경에 맞는 .env 파일 심볼릭 링크 생성
          # 서버의 backend 폴더 안에는 이미 .env.dev, .env.stg, .env.prod가 직접 생성되어 있어야 합니다.
          cd ~/pivot/backend
          BRANCH_NAME=${{ github.ref_name }}
          
          if [ ! -f ".env.${BRANCH_NAME}" ]; then
            echo "Error: .env.${BRANCH_NAME} 파일이 서버에 존재하지 않습니다."
            exit 1
          fi
          
          # .env.${BRANCH_NAME} 파일을 .env로 연결
          ln -sf .env.${BRANCH_NAME} .env
          
          # 2. 도커 컴포즈 실행
          cd ..
          docker-compose down
          docker-compose up --build -d backend
          
          # 3. 찌꺼기 이미지 정리
          docker image prune -f